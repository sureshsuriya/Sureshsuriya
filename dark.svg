<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" rx="18" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="220" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="220" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="220" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="220" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="220" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="220" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="220" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="220" stroke="#7c3aed" stroke-width="0.5"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="120" cy="110" r="80" fill="#7c3aed" opacity="0.07"/>
  <circle cx="780" cy="110" r="60" fill="#06b6d4" opacity="0.07"/>

  <!-- Accent top bar -->
  <rect x="0" y="0" width="900" height="4" rx="2" fill="url(#accent)"/>

  <!-- Left Code Bracket -->
  <text x="52" y="130" font-family="'Courier New', monospace" font-size="72" fill="url(#textGrad)" opacity="0.15" filter="url(#glow)">{</text>

  <!-- Avatar circle placeholder -->
  <circle cx="100" cy="110" r="46" fill="none" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="110" r="43" fill="#1a1f2e"/>
  <!-- Code icon -->
  <text x="78" y="122" font-family="'Courier New', monospace" font-size="28" fill="url(#textGrad)" filter="url(#subtleglow)">&lt;/&gt;</text>

  <!-- Name -->
  <text x="165" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="url(#textGrad)" filter="url(#subtleglow)">Suresh Suriya</text>

  <!-- Animated cursor -->
  <rect x="449" y="60" width="3" height="28" rx="1" fill="#7c3aed" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Role / tagline -->
  <text x="165" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#8b949e">Full-Stack Developer · Open Source Enthusiast</text>

  <!-- Tags -->
  <rect x="165" y="130" width="90" height="24" rx="12" fill="#7c3aed" opacity="0.2"/>
  <text x="210" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">Next.js</text>

  <rect x="263" y="130" width="90" height="24" rx="12" fill="#06b6d4" opacity="0.15"/>
  <text x="308" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#67e8f9" text-anchor="middle">TypeScript</text>

  <rect x="361" y="130" width="80" height="24" rx="12" fill="#10b981" opacity="0.15"/>
  <text x="401" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">React 19</text>

  <rect x="449" y="130" width="80" height="24" rx="12" fill="#f59e0b" opacity="0.15"/>
  <text x="489" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#fcd34d" text-anchor="middle">MongoDB</text>

  <!-- Stats row -->
  <g transform="translate(165, 170)">
    <!-- Commits stat -->
    <circle cx="10" cy="10" r="5" fill="#10b981" opacity="0.8"/>
    <text x="22" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#6b7280">Building CommitPulse · GitHub Analytics · OSS</text>
  </g>

  <!-- Right decoration: floating dots -->
  <g opacity="0.5" filter="url(#glow)">
    <circle cx="800" cy="70" r="3" fill="#7c3aed"/>
    <circle cx="820" cy="90" r="2" fill="#06b6d4"/>
    <circle cx="790" cy="100" r="4" fill="#10b981"/>
    <circle cx="840" cy="75" r="2.5" fill="#a78bfa"/>
    <circle cx="810" cy="120" r="3" fill="#67e8f9"/>
    <circle cx="850" cy="110" r="2" fill="#7c3aed"/>
    <circle cx="830" cy="140" r="3.5" fill="#06b6d4"/>
    <circle cx="800" cy="150" r="2" fill="#10b981"/>
    <circle cx="860" cy="130" r="1.5" fill="#a78bfa"/>
  </g>

  <!-- Right bracket -->
  <text x="840" y="130" font-family="'Courier New', monospace" font-size="72" fill="url(#textGrad)" opacity="0.15" filter="url(#glow)">}</text>

  <!-- Border -->
  <rect width="900" height="220" rx="18" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>
</svg>
